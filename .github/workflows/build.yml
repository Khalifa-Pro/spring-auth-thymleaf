name: build

on:
  push:
    branches: [ master, release ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Image
        run: |
          mvn spring-boot:build-image \
            -Dspring-boot.build-image.imageName=${{ secrets.DOCKER_USER }}/spring-auth-thymeleaf-alkhalifa:${{ github.sha }} \
            -DskipTests

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/spring-auth-thymeleaf-alkhalifa:${{ github.sha }}
